<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">WillBuddy launch card</title>
  <desc id="desc">A branded WillBuddy social card for Texas estate planning preparation.</desc>
  <rect width="1200" height="630" fill="#FAF8F5"/>
  <rect x="48" y="48" width="1104" height="534" rx="24" fill="#FFFFFF" stroke="#E8E0D6" stroke-width="3"/>
  <rect x="88" y="88" width="1024" height="454" rx="18" fill="#F0EBE4"/>
